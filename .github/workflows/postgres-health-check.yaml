name: postgres-health-check
on:
  push:
    branches:
      - 'main'
    paths:
      - '.github/workflows/postgres-health-check.yaml'
      - 'postgres-health-check/**'
  pull_request:
    paths:
      - '.github/workflows/postgres-health-check.yaml'
      - 'postgres-health-check/**'

env:
  DOCKER_BUILD_SUMMARY: false
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: 'postgres-health-check/ts'
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # v7
      - run: docker compose -f compose.yaml -f compose.ci.yaml up -d database
      - run: docker compose -f compose.yaml -f compose.ci.yaml run --rm app npm ci
      - run: docker compose -f compose.yaml -f compose.ci.yaml run --rm app npm run ci
      - run: docker compose -f compose.yaml -f compose.ci.yaml run --rm app npm run build
      - name: Run test
        run: docker compose -f compose.yaml -f compose.ci.yaml run --rm app npm test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log into registry ghcr.io
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/k-kojima-yumemi/postgres-health-check:latest
          platforms: linux/amd64,linux/arm64
          context: 'postgres-health-check/ts'
          file: 'postgres-health-check/ts/Dockerfile'

  renovate-check:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    needs:
      - test
      - build
    if: ${{ cancelled() || failure() }}
    steps:
      - run: 'false'
