name: postgres-health-check
on:
  push:
    branches:
      - 'main'
    paths:
      - '.github/workflows/postgres-health-check.yaml'
      - 'postgres-health-check/**'
  pull_request:
    paths:
      - '.github/workflows/postgres-health-check.yaml'
      - 'postgres-health-check/**'

env:
  DOCKER_BUILD_SUMMARY: false
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: 'postgres-health-check/ts'
    steps:
      - uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
      - run: docker compose -f compose.yaml -f compose.ci.yaml up -d database
      - run: docker compose -f compose.yaml -f compose.ci.yaml run --rm app npm ci
      - run: docker compose -f compose.yaml -f compose.ci.yaml run --rm app npm run ci
      - run: docker compose -f compose.yaml -f compose.ci.yaml run --rm app npm run build
      - name: Run test
        run: docker compose -f compose.yaml -f compose.ci.yaml run --rm app npm test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log into registry ghcr.io
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/k-kojima-yumemi/postgres-health-check:latest
          platforms: linux/amd64,linux/arm64
          context: 'postgres-health-check/ts'
          file: 'postgres-health-check/ts/Dockerfile'

  renovate-check:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    needs:
      - test
      - build
    if: ${{ cancelled() || failure() }}
    steps:
      - run: 'false'
