name: ecs-initial-image
on:
  push:
    branches:
      - 'main'
    paths: 
      - '.github/workflows/ecs-initial-image.yaml'
      - 'ecs-initial-image/**'
  pull_request:
    paths: 
      - '.github/workflows/ecs-initial-image.yaml'
      - 'ecs-initial-image/**'

env:
  DOCKER_BUILD_SUMMARY: false
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: 'ecs-initial-image'
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10' # v6.0.3
      - uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # v6.4.0
        with:
          node-version-file: 'ecs-initial-image/package.json'
      - run: npm ci
      - run: npm run ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10' # v6.0.3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log into registry ghcr.io
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/k-kojima-yumemi/ecs-initial-image:latest
          platforms: linux/amd64,linux/arm64
          context: 'ecs-initial-image'
          file: 'ecs-initial-image/Dockerfile'

  renovate-check:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    needs:
      - test
      - build
    # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/accessing-contextual-information-about-workflow-runs#needs-context for result values
    if: ${{ cancelled() || failure() }}
    steps:
      - run: 'false'
