name: 'ubuntu24.04-terraform-aws'

on:
  push:
    branches:
      - main
    paths: 
      - '.github/workflows/ubuntu24.04-terraform-aws.yaml'
      - 'ubuntu24.04-terraform-aws/**'
  schedule:
    - cron: '22 16 */10 * *'

permissions:
  contents: read
  packages: write

env:
  DOCKER_BUILD_SUMMARY: false
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          push: true
          tags: ghcr.io/k-kojima-yumemi/ubuntu24.04-terraform-aws:latest
          platforms: linux/amd64,linux/arm64
          context: 'ubuntu24.04-terraform-aws'
          file: 'ubuntu24.04-terraform-aws/Dockerfile'
