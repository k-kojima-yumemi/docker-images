name: 'ubuntu24.04-terraform-aws'

on:
  push:
    branches:
      - main
    paths: 
      - '.github/workflows/ubuntu24.04-terraform-aws.yaml'
      - 'ubuntu24.04-terraform-aws/**'
  schedule:
    - cron: '22 16 */10 * *'

permissions:
  contents: read
  packages: write

env:
  DOCKER_BUILD_SUMMARY: false
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: true
          tags: ghcr.io/k-kojima-yumemi/ubuntu24.04-terraform-aws:latest
          platforms: linux/amd64,linux/arm64
          context: 'ubuntu24.04-terraform-aws'
          file: 'ubuntu24.04-terraform-aws/Dockerfile'
