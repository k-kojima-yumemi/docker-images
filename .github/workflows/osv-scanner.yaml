name: OSV Scanner

on:
  push:
    branches:
      - main
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '.github/workflows/*.yaml'
  pull_request:
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '.github/workflows/*.yaml'
  schedule:
    - cron: '15 5 * * 1'

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  scan-push:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.3

  scan-pr:
    if: github.event_name == 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.3

  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - run: docker run --rm rhysd/actionlint:latest -version
      - run: docker run --rm -v "$(pwd):/repo" --workdir /repo rhysd/actionlint:latest -color
